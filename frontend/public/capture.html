<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="Kortex Capture" />
<title>Kortex Quick Capture</title>
<link rel="icon" href="/favicon.svg" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e5e5e5;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #16161f;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px;
  }
  h1 {
    font-size: 15px;
    font-weight: 800;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  p.sub { font-size: 12px; color: #888; margin: 0 0 20px; }
  textarea {
    width: 100%;
    min-height: 110px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #0e0e15;
    color: #f0f0f0;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #6366f1; }
  button {
    padding: 13px 10px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:active { opacity: 0.7; }
  button:disabled { opacity: 0.4; cursor: default; }
  #ask-btn {
    width: 100%;
    margin-top: 12px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    font-size: 14px;
    padding: 14px;
  }
  .fallback-row { display: flex; gap: 8px; margin-top: 8px; }
  .fallback-row button {
    flex: 1;
    background: #1e1e28;
    color: #999;
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 11px;
    padding: 9px 8px;
  }
  #status {
    margin-top: 14px;
    font-size: 12px;
    line-height: 1.5;
    min-height: 16px;
  }
  #status .response-text { font-weight: 600; color: #e5e5e5; }
  #status .response-text.err { color: #f87171; }
  #status ul { margin: 8px 0 0; padding-left: 18px; color: #34d399; font-weight: 600; }
  #status li { margin-bottom: 3px; }
  .key-row {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: #666;
  }
  .key-row button {
    background: none;
    border: none;
    color: #6366f1;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 0;
    text-decoration: underline;
  }
  #key-setup { text-align: center; }
  #key-setup input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: #0e0e15;
    color: #f0f0f0;
    font-size: 14px;
    margin: 14px 0;
  }
  #key-setup input:focus { outline: none; border-color: #6366f1; }
</style>
</head>
<body>

<div class="card">
  <div id="key-setup" style="display:none;">
    <h1>🧠 Connect Kortex</h1>
    <p class="sub">Paste your API key (find it under "Copy API Key" in the app sidebar). Stored only on this device.</p>
    <input type="text" id="key-input" placeholder="kt_live_..." autocomplete="off" autocapitalize="off" spellcheck="false" />
    <button id="save-key-btn" style="width:100%; background:#6366f1; color:white;">Save & Continue</button>
  </div>

  <div id="capture-ui" style="display:none;">
    <h1>🧠 Kortex Quick Capture</h1>
    <p class="sub">Say what's on your mind — Kortex figures out what to do with it.</p>
    <textarea id="capture-input" placeholder="e.g. I have an Istio exam on Aug 20, add it to my schedule&#10;e.g. remember I hate meetings before 11am" autofocus></textarea>

    <button id="ask-btn">🧠 Ask Kortex</button>
    <div class="fallback-row">
      <button id="remember-btn" title="Instantly save as a memory, no AI reasoning">💭 Quick Remember</button>
      <button id="task-btn" title="Instantly add as a task, no AI reasoning">✅ Quick Task</button>
    </div>

    <div id="status"></div>
    <div class="key-row">
      <span id="key-hint"></span>
      <button id="change-key-btn">Change API Key</button>
    </div>
  </div>
</div>

<script>
(function () {
  var API_BASE = 'https://daily-planner-00g2.onrender.com/api';
  var STORAGE_KEY = 'kortex_capture_api_key';

  var keySetup = document.getElementById('key-setup');
  var captureUi = document.getElementById('capture-ui');
  var keyInput = document.getElementById('key-input');
  var saveKeyBtn = document.getElementById('save-key-btn');
  var changeKeyBtn = document.getElementById('change-key-btn');
  var keyHint = document.getElementById('key-hint');
  var input = document.getElementById('capture-input');
  var askBtn = document.getElementById('ask-btn');
  var rememberBtn = document.getElementById('remember-btn');
  var taskBtn = document.getElementById('task-btn');
  var status = document.getElementById('status');
  var allButtons = [askBtn, rememberBtn, taskBtn];

  function getKey() { return localStorage.getItem(STORAGE_KEY) || ''; }

  function showCaptureUi() {
    var key = getKey();
    keySetup.style.display = 'none';
    captureUi.style.display = 'block';
    keyHint.textContent = 'Key: ' + key.slice(0, 8) + '...' + key.slice(-4);
    input.focus();
  }

  function showKeySetup() {
    keySetup.style.display = 'block';
    captureUi.style.display = 'none';
    keyInput.value = getKey();
    keyInput.focus();
  }

  saveKeyBtn.addEventListener('click', function () {
    var key = keyInput.value.trim();
    if (!key) return;
    localStorage.setItem(STORAGE_KEY, key);
    showCaptureUi();
  });

  keyInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') saveKeyBtn.click();
  });

  changeKeyBtn.addEventListener('click', showKeySetup);

  function setBusy(busy) {
    allButtons.forEach(function (b) { b.disabled = busy; });
  }

  function renderResult(text, actions, isError) {
    var html = '<div class="response-text' + (isError ? ' err' : '') + '">' + text.replace(/</g, '&lt;') + '</div>';
    if (actions && actions.length > 0) {
      html += '<ul>' + actions.map(function (a) { return '<li>' + a.replace(/</g, '&lt;') + '</li>'; }).join('') + '</ul>';
    }
    status.innerHTML = html;
  }

  // Fast, deterministic paths: no AI reasoning, single API call, instant.
  function submitFast(kind) {
    var text = input.value.trim();
    if (!text) return;

    var url = kind === 'task' ? API_BASE + '/integration/task' : API_BASE + '/integration/memory';
    var body = kind === 'task' ? { text: text } : { content: text };

    setBusy(true);
    renderResult('Saving...', null, false);

    fetch(url, {
      method: 'POST',
      headers: { 'x-api-key': getKey(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
      .then(function (res) {
        return res.json().then(function (data) { return { ok: res.ok, status: res.status, data: data }; });
      })
      .then(function (result) {
        setBusy(false);
        if (result.ok) {
          renderResult((kind === 'task' ? '✓ Task added: ' : '✓ Remembered: ') + text.slice(0, 60), null, false);
          input.value = '';
          input.focus();
        } else if (result.status === 401) {
          renderResult('Invalid API key — tap "Change API Key" below.', null, true);
        } else {
          renderResult('Failed: ' + (result.data && result.data.error ? result.data.error : 'Unknown error'), null, true);
        }
      })
      .catch(function (err) {
        setBusy(false);
        renderResult('Network error: ' + err.message, null, true);
      });
  }

  // Smart path: routes through the same AI reasoning as the in-app chat —
  // can create tasks, remember facts, update goals, all from one message.
  function submitSmart() {
    var text = input.value.trim();
    if (!text) return;

    setBusy(true);
    renderResult('🧠 Thinking...', null, false);

    fetch(API_BASE + '/integration/smart-capture', {
      method: 'POST',
      headers: { 'x-api-key': getKey(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text })
    })
      .then(function (res) {
        return res.json().then(function (data) { return { ok: res.ok, status: res.status, data: data }; });
      })
      .then(function (result) {
        setBusy(false);
        if (result.ok) {
          renderResult(result.data.response, result.data.executedActions, false);
          input.value = '';
          input.focus();
        } else if (result.status === 401) {
          renderResult('Invalid API key — tap "Change API Key" below.', null, true);
        } else {
          renderResult('Failed: ' + (result.data && result.data.error ? result.data.error : 'Unknown error'), null, true);
        }
      })
      .catch(function (err) {
        setBusy(false);
        renderResult('Network error: ' + err.message, null, true);
      });
  }

  askBtn.addEventListener('click', submitSmart);
  rememberBtn.addEventListener('click', function () { submitFast('memory'); });
  taskBtn.addEventListener('click', function () { submitFast('task'); });

  input.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') submitSmart();
  });

  if (getKey()) {
    showCaptureUi();
  } else {
    showKeySetup();
  }
})();
</script>

</body>
</html>
